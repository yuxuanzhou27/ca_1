{% extends "base.html" %}

{% block main_content %}

<section>
    <h3>
        Your transactions
    </h3>
    <table>
        <tr>
            <th>Currency</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
        </tr>

        {% for row in content %}
        <tr>
            <td>{{ row["currency"] }}</td>
            <td>{{ row["amount"] }}</td>
            <td>{{ row["type"] }}</td>
            <td>{{ row["category"] }}</td>
            <td>{{ row["date"] }}</td>
        </tr>
        {% endfor %}
    </table>
</section>

<a href="{{ url_for('add_transactions') }}">Add transaction</a>

{% endblock %}
